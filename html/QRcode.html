<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../images/dzlogo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App下载中心</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #88d4ab 50%, #7ec8a0 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), inset 0 -4px 0 rgba(0, 0, 0, 0.1);
            padding: 40px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
            border: 4px solid rgba(255, 255, 255, 0.8);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            color: #2d5a27;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8);
        }

        h1 i {
            animation: bounce 1s ease-in-out infinite;
            display: inline-block;
        }

        .subtitle {
            color: #5a7a52;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-section {
            margin-bottom: 40px;
            background: linear-gradient(145deg, #f0f9f0, #e8f5e8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1), inset 0 -3px 0 rgba(0, 0, 0, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.9);
        }

        .section-title {
            font-size: 1.3rem;
            color: #2d5a27;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #4CAF50;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .custom-select {
            position: relative;
            width: 100%;
        }

        .custom-select-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 20px;
            border: 3px solid #c8e6c9;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08), inset 0 -2px 0 rgba(0, 0, 0, 0.05);
        }

        .custom-select-trigger:hover {
            border-color: #81c784;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
        }

        .custom-select.open .custom-select-trigger {
            border-color: #4CAF50;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
        }

        .select-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 8px;
            background: #f5f5f5;
            padding: 2px;
        }

        .select-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .custom-select-arrow {
            color: #4CAF50;
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .custom-select.open .custom-select-arrow {
            transform: rotate(180deg);
        }

        .custom-select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 18px;
            background: white;
            border: 3px solid #c8e6c9;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            max-height: 800px;
            overflow-y: auto;
        }

        .custom-select.open .custom-select-options {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        .custom-select-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .custom-select-option:first-child {
            border-radius: 12px 12px 0 0;
        }

        .custom-select-option:last-child {
            border-radius: 0 0 12px 12px;
        }

        .custom-select-option:hover {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            transform: translateX(5px);
        }

        .custom-select-option.selected {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
        }

        .option-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }

        .custom-select-option:hover .option-icon {
            transform: scale(1.1);
        }

        .option-text {
            font-size: 15px;
            font-weight: 500;
        }

        .custom-select-option.selected .option-text {
            color: white;
        }

        #fetchBtn {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
        }

        #fetchBtn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.5);
        }

        #fetchBtn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 3px 10px rgba(76, 175, 80, 0.3);
        }

        #fetchBtn i {
            animation: spin 2s linear infinite;
            display: inline-block;
        }

        .app-card {
            background: linear-gradient(145deg, #f5faf5, #e8f5e8);
            border-radius: 25px;
            padding: 35px;
            margin-top: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12), inset 0 -4px 0 rgba(0, 0, 0, 0.08);
            border: 4px solid rgba(255, 255, 255, 0.9);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease-out;
        }

        .app-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        .app-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px dashed #c8e6c9;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 28px;
            margin-right: 25px;
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .app-card:hover .app-icon {
            animation: bounce 0.6s ease-in-out;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 22px;
        }

        .app-info {
            flex: 1;
        }

        .app-title {
            font-size: 26px;
            font-weight: 700;
            color: #2d5a27;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.8);
        }

        .app-id {
            font-size: 15px;
            color: #5a7a52;
            margin-bottom: 5px;
        }

        .app-version {
            font-size: 15px;
            color: #5a7a52;
        }

        .app-update-date {
            font-size: 15px;
            color: #5a7a52;
            margin-top: 8px;
        }

        .qr-container {
            text-align: center;
            margin: 35px 0;
            padding: 25px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1), inset 0 -3px 0 rgba(0, 0, 0, 0.05);
            border: 3px solid #e8f5e9;
        }

        .qr-title {
            font-size: 1.2rem;
            color: #2d5a27;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .qr-title i {
            animation: pulse 1.5s ease-in-out infinite;
            color: #4CAF50;
        }

        .qr-code {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            background: linear-gradient(145deg, #f5f5f5, #e8e8e8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12), inset 0 -2px 0 rgba(0, 0, 0, 0.05);
            border: 3px solid white;
        }

        .qr-code.loading {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .qr-code.error {
            background: linear-gradient(145deg, #ffebee, #ffcdd2);
            color: #c62828;
        }

        .download-section {
            text-align: center;
            margin: 35px 0;
        }

        .download-title {
            font-size: 1.2rem;
            color: #2d5a27;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .download-title i {
            color: #4CAF50;
        }

        .download-link {
            background: white;
            padding: 20px;
            border-radius: 15px;
            word-break: break-all;
            font-size: 14px;
            color: #555;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08), inset 0 -2px 0 rgba(0, 0, 0, 0.03);
            border: 2px solid #e8f5e9;
            font-family: 'Courier New', monospace;
        }

        .download-btn {
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4), inset 0 -4px 0 rgba(0, 0, 0, 0.1);
            margin: 10px 5px;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
        }

        .download-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 35px rgba(76, 175, 80, 0.5);
        }

        .download-btn:active {
            transform: translateY(2px) scale(0.97);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .copy-btn {
            background: linear-gradient(135deg, #42a5f5 0%, #1e88e5 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
        }

        .copy-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.5);
        }

        .copy-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 3px 10px rgba(33, 150, 243, 0.3);
        }

        .status {
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 15px;
            font-weight: 600;
            animation: fadeInUp 0.3s ease-out;
        }

        .status.loading {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            color: #1565c0;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.2);
        }

        .status.success {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #2e7d32;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        .status.error {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            color: #c62828;
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.2);
        }

        .retry-btn {
            background: linear-gradient(135deg, #ffa726 0%, #f57c00 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-left: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        .retry-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 18px rgba(255, 152, 0, 0.4);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 3px dashed #c8e6c9;
            color: #5a7a52;
            font-size: 0.95rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
                border-radius: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .qr-code {
                width: 180px;
                height: 180px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .app-header {
                flex-direction: column;
                text-align: center;
            }

            .app-icon {
                margin-right: 0;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-download"></i> APP下载中心</h1>
            <p class="subtitle">下拉选择需要的应用，获取下载链接和二维码</p>
        </header>

        <div class="input-section">
            <h2 class="section-title"><i class="fas fa-search"></i> 选择应用</h2>
            <div class="input-group">
                <div class="custom-select-wrapper" style="flex: 1; position: relative;">
                    <div class="custom-select" id="customSelect">
                        <div class="custom-select-trigger" id="selectTrigger">
                            <span class="select-icon-img" id="currentIcon"></span>
                            <span class="select-text" id="currentText">请选择要下载的App</span>
                            <span class="custom-select-arrow"><i class="fas fa-chevron-down"></i></span>

                        <div class="custom-select-options" id="selectOptions">

                                <span class="option-text">请选择要下载的App</span>

                            <div class="custom-select-option" data-value="602" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/45ababd37b13ec581dc113bf838d583.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/45ababd37b13ec581dc113bf838d583.png" class="option-icon">
                                <span class="option-text">健康测评</span>
                            </div>
                            <div class="custom-select-option" data-value="4" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/e46524ac20eb6dc50d1bfb706ea53ed9.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/e46524ac20eb6dc50d1bfb706ea53ed9.png" class="option-icon">
                                <span class="option-text">心身健康测评系统</span>
                            </div>
                            <div class="custom-select-option" data-value="3" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/cuxing.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/cuxing.png" class="option-icon">
                                <span class="option-text">促醒监护</span>
                            </div>
                            <div class="custom-select-option" data-value="500" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20240820145829.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20240820145829.png" class="option-icon">
                                <span class="option-text">个人健康精英版</span>
                            </div>
                            <div class="custom-select-option" data-value="504" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/c57ddcc3dc637b4987247b9b1bcb3a9f.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/c57ddcc3dc637b4987247b9b1bcb3a9f.png" class="option-icon">
                                <span class="option-text">场效应反馈</span>
                            </div>
                            <div class="custom-select-option" data-value="508" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/pro.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/pro.png" class="option-icon">
                                <span class="option-text">个人健康精英鸿蒙版</span>
                            </div>
                            <div class="custom-select-option" data-value="701" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png" class="option-icon">
                                <span class="option-text">多参数监护仪app</span>
                            </div>
                            <div class="custom-select-option" data-value="15" data-icon="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png">
                                <img src="https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png" class="option-icon">

                    </div>
                    <input type="hidden" id="appSelect" value="">
                </div>
                <button id="fetchBtn"><i class="fas fa-sync-alt"></i> 获取信息</button>
            </div>
            <p>选择App后，系统将获取下载信息并生成二维码</p>
        </div>

        <div id="appCard" class="app-card" style="display: none;">
            <div class="app-header">
                <div class="app-icon" id="appIcon">
                    <img src="" alt="App图标" id="appIconImg" style="width: 100%; height: 100%; border-radius: 20px; object-fit: cover;">
                </div>
                <div class="app-info">
                    <div class="app-title" id="appName">应用名称</div>
                    <div class="app-id" id="appId">App ID: </div>
                    <div class="app-version" id="appVersion">版本: </div>
                    <div class="app-update-date" id="appUpdateDate">更新日期: </div>
                </div>
            </div>

            <div class="qr-container">
                <h3 class="qr-title"><i class="fas fa-qrcode"></i> 扫描二维码下载</h3>
                <div class="qr-code loading" id="qrCode">
                    <div>正在生成二维码...</div>
                </div>
            </div>

            <div class="download-section">
                <h3 class="download-title"><i class="fas fa-link"></i> 下载链接</h3>
                <div class="download-link" id="downloadLink">下载链接将在此处显示</div>
                <a href="#" class="download-btn" id="downloadBtn"><i class="fas fa-download"></i> 直接下载App</a>
                <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> 复制链接</button>
            </div>

            <div id="statusMessage" class="status" style="display: none;"></div>
        </div>

        <footer>
            <p>&copy; APP全家桶下载中心</p>
        </footer>
    </div>

    <!-- 引入qrcode.js库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // 全局变量
        let appCache = {};
        let currentAppId = null;
        let isQRCodeLibReady = false;

        // DOM元素
        let appSelect, fetchBtn, appCard, appIcon, appName, appId, appVersion, qrCodeContainer, downloadLink, downloadBtn, copyBtn, statusMessage;

        // API端点基础URL
        const directBaseURL = 'https://management.lifetide.cn/path/management/version/get?appId=';

        // 检测运行环境并选择代理地址
        const isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        const proxyBase = isLocalDev
            ? 'http://localhost:3003/proxy?url='
            : '/.netlify/functions/proxy?url=';

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            appSelect = document.getElementById('appSelect');
            fetchBtn = document.getElementById('fetchBtn');
            appCard = document.getElementById('appCard');
            appIcon = document.getElementById('appIcon');
            appName = document.getElementById('appName');
            appId = document.getElementById('appId');
            appVersion = document.getElementById('appVersion');
            qrCodeContainer = document.getElementById('qrCode');
            downloadLink = document.getElementById('downloadLink');
            downloadBtn = document.getElementById('downloadBtn');
            copyBtn = document.getElementById('copyBtn');
            statusMessage = document.getElementById('statusMessage');

            // 预加载二维码库
            preloadQRCodeLibrary();

            // 初始化自定义下拉框
            initCustomSelect();

            // 绑定事件
            if (fetchBtn) {
                fetchBtn.addEventListener('click', onFetchBtnClick);
            }
            if (copyBtn) {
                copyBtn.addEventListener('click', onCopyBtnClick);
            }
        });

        // 预加载二维码库
        function preloadQRCodeLibrary() {
            if (typeof QRCode !== 'undefined') {
                isQRCodeLibReady = true;
                return;
            }

            const checkInterval = setInterval(() => {
                if (typeof QRCode !== 'undefined') {
                    isQRCodeLibReady = true;
                    clearInterval(checkInterval);
                }
            }, 100);

            setTimeout(() => {
                clearInterval(checkInterval);
            }, 5000);
        }

        // 获取按钮点击事件
        function onFetchBtnClick() {
            const selectedAppId = appSelect ? appSelect.value : '';
            fetchAppInfo(selectedAppId, true);
        }

        // 复制链接按钮点击事件
        function onCopyBtnClick() {
            if (!currentAppId || !appCache[currentAppId]) {
                showStatus('请先选择并获取App信息', 'error');
                return;
            }

            const appInfo = appCache[currentAppId];
            const downloadUrl = appInfo.downloadUrl;

            if (!downloadUrl) {
                showStatus('无下载链接可复制', 'error');
                return;
            }

            copyToClipboard(downloadUrl, '链接复制成功');
        }

        // 获取App信息
        async function fetchAppInfo(selectedAppId, forceRefresh = false) {
            if (!selectedAppId) {
                showStatus('请选择一个App', 'error');
                return;
            }

            currentAppId = selectedAppId;

            // 检查缓存（除非强制刷新）
            if (!forceRefresh && appCache[selectedAppId]) {
                const cachedItem = appCache[selectedAppId];
                const now = Date.now();
                const cacheTime = cachedItem.cacheTime || 0;
                if (now - cacheTime < 5 * 60 * 1000) {
                    displayAppInfo(cachedItem);
                    showStatus('使用缓存数据加载成功！', 'success');
                    return;
                } else {
                    delete appCache[selectedAppId];
                }
            }

            // 显示加载状态
            if (appCard) {
                appCard.style.display = 'block';
            }
            if (qrCodeContainer) {
                qrCodeContainer.innerHTML = '<div>正在获取App信息...</div>';
                qrCodeContainer.className = 'qr-code loading';
            }
            showStatus('正在获取App信息...', 'loading');

            await new Promise(resolve => setTimeout(resolve, 100));

            // 定义请求方法
            const fetchMethods = [
                {
                    name: isLocalDev ? '本地代理' : 'Netlify Function代理',
                    fetch: async () => {
                        const targetURL = directBaseURL + selectedAppId;
                        const proxyURL = proxyBase + encodeURIComponent(targetURL);
                        const response = await fetch(proxyURL);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return await response.json();
                    }
                },
                {
                    name: '直接API调用',
                    fetch: async () => {
                        const response = await fetch(directBaseURL + selectedAppId);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return await response.json();
                    }
                }
            ];

            let lastError = null;

            for (let i = 0; i < fetchMethods.length; i++) {
                const method = fetchMethods[i];
                try {
                    showStatus(`正在尝试${method.name}...`, 'loading');

                    const apiData = await Promise.race([
                        method.fetch(),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('请求超时')), 15000))
                    ]);

                    if (apiData.code !== 200) {
                        throw new Error('API返回错误: ' + (apiData.message || '未知错误'));
                    }

                    const obj = apiData.obj;
                    if (!obj) {
                        throw new Error('API响应中缺少obj对象');
                    }

                    const name = getAppName(selectedAppId);
                    const versionName = obj.versionName || '未知版本';
                    const downloadUrl = (obj.downloadUrl || '').trim();
                    const createDate = obj.createDate || '';
                    const iconUrl = obj.iconUrl || obj.appIcon || '';

                    if (!downloadUrl) {
                        throw new Error('返回数据中未找到有效的下载链接');
                    }

                    appCache[selectedAppId] = {
                        id: selectedAppId,
                        name: name,
                        version: versionName,
                        downloadUrl: downloadUrl,
                        iconUrl: iconUrl,
                        createDate: createDate,
                        cacheTime: Date.now()
                    };

                    displayAppInfo(appCache[selectedAppId]);
                    showStatus('App信息获取成功！', 'success');
                    return;

                } catch (error) {
                    console.error(`${method.name} 失败:`, error);
                    lastError = error;

                    if (i < fetchMethods.length - 1) {
                        showStatus(`${method.name} 失败，尝试下一个...`, 'loading');
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                }
            }

            const errorMessage = lastError ? lastError.message : '所有请求方式都不可用';
            showStatus(`获取失败: ${errorMessage}，请稍后重试`, 'error');
            if (qrCodeContainer) {
                qrCodeContainer.innerHTML = '获取失败';
                qrCodeContainer.className = 'qr-code error';
            }
            if (statusMessage) {
                statusMessage.innerHTML += ' <button class="retry-btn" onclick="retryFetch()">重试</button>';
            }
        }

        // 显示App信息
        function displayAppInfo(appInfo) {
            if (appName) {
                appName.textContent = appInfo.name || '未知应用';
            }
            if (appId) {
                appId.textContent = 'App ID: ' + appInfo.id;
            }
            if (appVersion) {
                appVersion.textContent = '版本: ' + (appInfo.version || '未知版本');
            }
            if (appIcon) {
                const appIconImg = document.getElementById('appIconImg');
                if (appIconImg) {
                    let iconUrl = appInfo.iconUrl;
                    if (!iconUrl) {
                        iconUrl = getAppIconUrl(appInfo.id);
                    }
                    appIconImg.src = iconUrl;
                    appIconImg.alt = appInfo.name || 'App图标';
                }
            }

            const appUpdateDate = document.getElementById('appUpdateDate');
            if (appUpdateDate) {
                if (appInfo.createDate) {
                    const formattedDate = formatDateString(appInfo.createDate);
                    appUpdateDate.textContent = '更新日期: ' + formattedDate;
                } else {
                    appUpdateDate.textContent = '更新日期: 未知';
                }
            }

            if (appCard) {
                appCard.style.display = 'block';
            }

            if (downloadLink) {
                downloadLink.textContent = appInfo.downloadUrl || '无下载链接';
            }

            if (downloadBtn) {
                downloadBtn.href = appInfo.downloadUrl || '#';
            }

            // 如果是移动端，添加download属性
            if (downloadBtn && /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                if (appInfo.downloadUrl) {
                    downloadBtn.setAttribute('download', '');
                } else {
                    downloadBtn.removeAttribute('download');
                }
            }

            // 生成二维码
            if (appInfo.downloadUrl) {
                waitForQRCodeLibrary()
                    .then(() => new Promise(resolve => setTimeout(resolve, 200)))
                    .then(() => generateQRCode(appInfo.downloadUrl))
                    .catch(error => {
                        console.error('二维码生成准备失败:', error);
                        if (qrCodeContainer) {
                            qrCodeContainer.innerHTML = '二维码生成失败: ' + error.message;
                            qrCodeContainer.className = 'qr-code error';
                        }
                    });
            } else {
                if (qrCodeContainer) {
                    qrCodeContainer.innerHTML = '无下载链接';
                    qrCodeContainer.className = 'qr-code error';
                }
            }
        }

        // 等待二维码库加载完成
        function waitForQRCodeLibrary() {
            return new Promise((resolve, reject) => {
                if (isQRCodeLibReady && typeof QRCode !== 'undefined') {
                    resolve();
                    return;
                }

                let attempts = 0;
                const checkInterval = setInterval(() => {
                    attempts++;
                    if (isQRCodeLibReady && typeof QRCode !== 'undefined') {
                        clearInterval(checkInterval);
                        resolve();
                    } else if (attempts >= 50) {
                        clearInterval(checkInterval);
                        reject(new Error('二维码库加载超时'));
                    }
                }, 100);
            });
        }

        // 生成二维码函数
        function generateQRCode(url) {
            if (qrCodeContainer) {
                qrCodeContainer.innerHTML = '';
                qrCodeContainer.className = 'qr-code';
            }

            try {
                if (!isQRCodeLibReady || typeof QRCode === 'undefined') {
                    throw new Error('二维码生成库未准备好');
                }

                let qrUrl = url;
                try {
                    const urlObj = new URL(url);
                    qrUrl = urlObj.toString();
                } catch (urlError) {
                    console.warn('URL格式可能有误:', urlError);
                }

                if (qrCodeContainer) {
                    qrCodeContainer.innerHTML = '';
                    new QRCode(qrCodeContainer, {
                        text: qrUrl,
                        width: 200,
                        height: 200,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            } catch (error) {
                console.error('二维码生成错误:', error);
                if (qrCodeContainer) {
                    qrCodeContainer.innerHTML = '二维码生成失败: ' + error.message;
                    qrCodeContainer.className = 'qr-code error';
                }
            }
        }

        // 获取应用图标URL
        function getAppIconUrl(appId) {
            const iconUrls = {
                '602': 'https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/45ababd37b13ec581dc113bf838d583.png',
                '508': 'https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/pro.png',
                '502': 'https://lifetide.oss-cn-beijing.aliyuncs.com/upload/logo/pro.png',
                '1': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png',
                '3': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/cuxing.png',
                '500': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20240820145829.png',
                '504': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/c57ddcc3dc637b4987247b9b1bcb3a9f.png',
                '4': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/e46524ac20eb6dc50d1bfb706ea53ed9.png',
                '701': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png',
                '15': 'https://lifetide.oss-cn-beijing.aliyuncs.com/logo/sleep.png',
            };
            return iconUrls[appId] || 'https://management.lifetide.cn/title.ico';
        }

        // 初始化自定义下拉框
        function initCustomSelect() {
            const customSelect = document.getElementById('customSelect');
            const selectTrigger = document.getElementById('selectTrigger');
            const selectOptions = document.getElementById('selectOptions');
            const appSelect = document.getElementById('appSelect');

            if (!customSelect || !selectTrigger || !selectOptions || !appSelect) {
                return;
            }

            selectTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                customSelect.classList.toggle('open');
            });

            const options = selectOptions.querySelectorAll('.custom-select-option');
            options.forEach(option => {
                option.addEventListener('click', function() {
                    const value = this.getAttribute('data-value');
                    const icon = this.getAttribute('data-icon');
                    const text = this.querySelector('.option-text').textContent;

                    appSelect.value = value;

                    const currentIcon = document.getElementById('currentIcon');
                    const currentText = document.getElementById('currentText');

                    if (currentIcon) {
                        if (icon) {
                            currentIcon.innerHTML = `<img src="${icon}" class="select-icon-img" style="width: 32px; height: 32px; object-fit: contain; border-radius: 6px;">`;
                        } else {
                            currentIcon.innerHTML = '';
                        }
                    }
                    if (currentText) {
                        currentText.textContent = text;
                    }

                    options.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');

                    customSelect.classList.remove('open');

                    // 触发change事件
                    const event = new Event('change', { bubbles: true });
                    appSelect.dispatchEvent(event);

                    // 如果选择了有效的App，自动获取信息
                    if (value) {
                        fetchAppInfo(value, true);
                    } else {
                        // 清除选择时隐藏卡片
                        if (appCard) appCard.style.display = 'none';
                        if (statusMessage) statusMessage.style.display = 'none';
                    }
                });
            });

            document.addEventListener('click', function() {
                customSelect.classList.remove('open');
            });

            selectOptions.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        // 获取应用名称
        function getAppName(appId) {
            const appNames = {
                '602': '健康测评',
                '508': '个人健康精英鸿蒙版',
                '502': '个人健康pro+',
                '1': '睡眠呼吸监测仪',
                '3': '促醒监护',
                '500': '个人健康精英版',
                '504': '场效应反馈',
                '4': '心身健康测评系统',
                '701': '多参数监护仪app',
                '15': '脑电app',
            };
            return appNames[appId] || '未知应用';
        }

        // 格式化日期字符串
        function formatDateString(dateString) {
            if (!dateString) return '未知';

            try {
                const date = new Date(dateString);
                if (!isNaN(date.getTime())) {
                    return date.getFullYear() + '-' +
                          String(date.getMonth() + 1).padStart(2, '0') + '-' +
                          String(date.getDate()).padStart(2, '0');
                }
            } catch (e) {
                console.error('日期解析错误:', e);
            }

            return dateString;
        }

        // 重试获取App信息
        function retryFetch() {
            if (currentAppId) {
                fetchAppInfo(currentAppId);
            }
        }

        // 显示状态消息
        function showStatus(message, type) {
            if (statusMessage) {
                statusMessage.textContent = message;
                statusMessage.className = 'status ' + type;
                statusMessage.style.display = 'block';
            }

            if (type === 'success') {
                setTimeout(() => {
                    if (statusMessage) {
                        statusMessage.style.display = 'none';
                    }
                }, 3000);
            }
        }

        // 复制到剪贴板函数
        function copyToClipboard(text, successMessage) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showStatus(successMessage, 'success');
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyText(text, successMessage);
                });
            } else {
                fallbackCopyText(text, successMessage);
            }
        }

        function fallbackCopyText(text, successMessage) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.select();

            try {
                document.execCommand('copy');
                showStatus(successMessage, 'success');
            } catch (err) {
                console.error('复制失败:', err);
                showStatus('复制失败，请手动复制', 'error');
            }

            document.body.removeChild(textArea);
        }
    </script>
</body>
