<script>
    // 数字滚动动画
    function animateValue(element, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const value = Math.floor(progress * (end - start) + start);
            element.textContent = value;
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    // 初始化数字动画
    function initNumberAnimation() {
        const statValues = document.querySelectorAll('.stat-value[data-target]');
        statValues.forEach(el => {
            const target = parseInt(el.getAttribute('data-target'));
            animateValue(el, 0, target, 1500);
        });
    }

    // 刷新数据功能
    function refreshData() {
        const refreshBtn = document.querySelector('.refresh-btn');
        refreshBtn.classList.add('refreshing');
        refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>刷新中...</span>';
        
        setTimeout(() => {
            refreshBtn.classList.remove('refreshing');
            refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i><span>刷新数据</span>';
            initNumberAnimation();
            console.log('数据已刷新');
        }, 1500);
    }

        const timeTabs = document.querySelectorAll('.time-tab');

                this.classList.add('active');
                const range = this.getAttribute('data-range');
                console.log('切换时间范围:', range);
            });
        });
    }

        function showAllLoadingStates() {
            const loadingElements = document.querySelectorAll('.chart-loading');
            loadingElements.forEach(el => {
                el.style.display = 'flex';
                el.classList.remove('hidden');
                const textEl = el.querySelector('p');
                if (textEl) {
                    textEl.textContent = 'ECharts加载中...';
                }
            });
        }
        
        function hideAllLoadingStates() {
            const loadingElements = document.querySelectorAll('.chart-loading');
            loadingElements.forEach(el => {
                el.classList.add('hidden');
                setTimeout(() => {
                    el.style.display = 'none';
                }, 400);
            });
        }
        
        function showErrorState() {
            const loadingElements = document.querySelectorAll('.chart-loading');
            loadingElements.forEach(el => {
                el.style.display = 'flex';
                el.innerHTML = `
                    <div style="color: #f44336; text-align: center;">
                        <div style="font-size: 32px; margin-bottom: 16px;">⚠️</div>
                        <p style="font-size: 14px;">图表加载失败，请刷新页面重试</p>
                    </div>
                `;
            });
        }

        function addEventListeners() {
            const userSelect = document.getElementById('userSelect');
            const timeRange = document.getElementById('timeRange');
            
            if (userSelect) {
                userSelect.addEventListener('change', updateCharts);
            }
            if (timeRange) {
                timeRange.addEventListener('change', updateCharts);
            }
            
            initTimeTabs();
        }

        function updateCharts() {
            console.log('更新图表...');
        }
        
        async function init() {
            await initCharts();
            addEventListeners();
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
